<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我的音源 — 控制台</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', -apple-system, sans-serif; padding: 20px; background: #f0f2f5; max-width: 520px; margin: 0 auto; color: #333; }
  .header { text-align: center; margin-bottom: 20px; }
  .header h2 { margin: 0; font-size: 20px; }
  .header p { color: #999; font-size: 12px; margin: 4px 0 0; }

  .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: bold; }
  .card-body { transition: all 0.3s; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
  .badge-ok { background: #e8f5e9; color: #2e7d32; }
  .badge-warn { background: #fff3e0; color: #e65100; }
  .badge-err { background: #ffebee; color: #c62828; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
  .info-item { display: flex; flex-direction: column; }
  .info-label { color: #999; font-size: 11px; }
  .info-value { color: #333; }

  /* QR */
  #wy-qrcode { width: 190px; height: 190px; margin: 10px auto; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 13px; }
  #wy-qrcode img { width: 175px; height: 175px; }
  .status-line { text-align: center; font-size: 13px; margin: 8px 0; min-height: 18px; }
  .status-line.success { color: #4caf50; font-weight: bold; }
  .status-line.error { color: #f44336; }

  /* QQ */
  textarea { width: 100%; height: 80px; border: 1px solid #ddd; border-radius: 6px; padding: 8px; font-size: 12px; resize: vertical; font-family: Consolas, monospace; }
  textarea:focus { outline: none; border-color: #1e88e5; }
  .help { color: #999; font-size: 11px; margin: 6px 0 10px; line-height: 1.6; }
  .help a { color: #1e88e5; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  button { padding: 8px 20px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
  .btn-primary { background: #1e88e5; color: #fff; }
  .btn-primary:hover { background: #1565c0; }
  .btn-red { background: #ec4141; color: #fff; }
  .btn-red:hover { background: #d33; }
  .btn-outline { background: #fff; color: #666; border: 1px solid #ccc; }
  .btn-outline:hover { background: #f5f5f5; }
  button:disabled { background: #ccc !important; cursor: not-allowed; }

  .footer { text-align: center; color: #bbb; font-size: 11px; margin-top: 20px; }
</style>
</head>
<body>
<div class="header">
  <h2>🎧 我的音源控制台</h2>
  <p>后端地址: http://127.0.0.1:3000</p>
</div>

<!-- 概览卡片 -->
<div class="card">
  <div class="card-header">
    <span class="card-title">📊 登录概览</span>
    <span id="overall-badge" class="badge badge-warn">检测中...</span>
  </div>
  <div class="info-grid">
    <div class="info-item"><span class="info-label">🎵 网易云</span><span class="info-value" id="info-wy">检测中...</span></div>
    <div class="info-item"><span class="info-label">🎶 QQ音乐</span><span class="info-value" id="info-qq">检测中...</span></div>
  </div>
</div>

<!-- 网易云 -->
<div class="card" id="card-wy">
  <div class="card-header">
    <span class="card-title">🎵 网易云音乐</span>
    <span id="wy-badge" class="badge badge-warn">检测中...</span>
  </div>
  <div class="card-body" id="wy-body">
    <div id="wy-logged-in" style="display:none">
      <div class="info-grid" id="wy-info"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn-outline" onclick="wyLogout()">🚪 退出登录</button>
        <button class="btn-outline" onclick="wyStart()">🔄 重新扫码</button>
      </div>
    </div>
    <div id="wy-login-form" style="display:none">
      <div id="wy-qrcode">点击下方按钮生成二维码</div>
      <div id="wy-status" class="status-line">未登录</div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn-red" id="wy-refresh" onclick="wyStart()">🔑 生成扫码二维码</button>
      </div>
    </div>
  </div>
</div>

<!-- QQ -->
<div class="card" id="card-qq">
  <div class="card-header">
    <span class="card-title">🎶 QQ 音乐</span>
    <span id="qq-badge" class="badge badge-warn">检测中...</span>
  </div>
  <div class="card-body" id="qq-body">
    <div id="qq-logged-in" style="display:none">
      <div class="info-grid" id="qq-info"></div>
      <div class="btn-row" style="margin-top:12px">
        <button class="btn-outline" onclick="qqLogout()">🚪 退出登录</button>
        <button class="btn-outline" onclick="qqShowForm()">🔄 更换Cookie</button>
      </div>
    </div>
    <div id="qq-login-form" style="display:none">
      <div id="qq-status" class="status-line"></div>
      <textarea id="qq-cookie-input" placeholder="uin=o123456789; qqmusic_key=...; ..."></textarea>
      <p class="help">
        <strong>如何获取？</strong> 浏览器打开 <a href="https://y.qq.com" target="_blank">y.qq.com</a> 并登录 →
        F12 → Application → Cookies → y.qq.com → 复制所有 cookie
      </p>
      <div class="btn-row">
        <button class="btn-primary" id="qq-save" onclick="qqSave()">💾 保存 Cookie</button>
        <button class="btn-outline" onclick="qqCheck()">🔍 检查状态</button>
      </div>
    </div>
  </div>
</div>

<div class="footer">Cookie 保存在本地，仅用于个人播放辅助</div>

<script>
const API = 'http://127.0.0.1:3000';
let wyTimer = null;

// ========== 页面初始化 ==========
async function init() {
  await Promise.all([checkWy(), checkQQ()]);
  updateOverall();
}
function updateOverall() {
  const wyOk = document.getElementById('wy-badge').classList.contains('badge-ok');
  const qqOk = document.getElementById('qq-badge').classList.contains('badge-ok');
  const b = document.getElementById('overall-badge');
  if (wyOk && qqOk) { b.textContent = '✅ 全部就绪'; b.className = 'badge badge-ok'; }
  else if (wyOk || qqOk) { b.textContent = '⚠️ 部分就绪'; b.className = 'badge badge-warn'; }
  else { b.textContent = '❌ 未登录'; b.className = 'badge badge-err'; }
}

// ========== 网易云 ==========
async function checkWy() {
  try {
    const r = await fetch(API + '/api/login/status');
    const d = await r.json();
    const badge = document.getElementById('wy-badge');
    const loggedIn = document.getElementById('wy-logged-in');
    const loginForm = document.getElementById('wy-login-form');
    const infoDiv = document.getElementById('wy-info');

    if (d.loggedIn) {
      badge.textContent = '✅ 已登录'; badge.className = 'badge badge-ok';
      loggedIn.style.display = 'block'; loginForm.style.display = 'none';
      infoDiv.innerHTML =
        '<div class="info-item"><span class="info-label">昵称</span><span class="info-value">' + (d.nickname || '-') + '</span></div>' +
        '<div class="info-item"><span class="info-label">VIP</span><span class="info-value">' + (d.vipLabel || '无') + '</span></div>';
      document.getElementById('info-wy').textContent = '✅ ' + (d.nickname || '已登录') + ' · ' + (d.vipLabel || '');
    } else {
      badge.textContent = '❌ 未登录'; badge.className = 'badge badge-err';
      loggedIn.style.display = 'none'; loginForm.style.display = 'block';
      document.getElementById('info-wy').textContent = '❌ 未登录';
      wyStart(); // 自动生成二维码
    }
  } catch(e) {
    document.getElementById('wy-badge').textContent = '⚠️ 连接失败'; document.getElementById('wy-badge').className = 'badge badge-err';
    document.getElementById('info-wy').textContent = '⚠️ 连接失败';
  }
}

async function wyStart() {
  const qrDiv = document.getElementById('wy-qrcode');
  const statusDiv = document.getElementById('wy-status');
  const btn = document.getElementById('wy-refresh');
  document.getElementById('wy-logged-in').style.display = 'none';
  document.getElementById('wy-login-form').style.display = 'block';
  if (wyTimer) clearInterval(wyTimer);

  qrDiv.innerHTML = '正在生成...';
  statusDiv.textContent = '';
  statusDiv.className = 'status-line';
  btn.disabled = true;

  try {
    const keyRes = await fetch(API + '/api/login/qr/key');
    const keyData = await keyRes.json();
    if (!keyData.key) throw new Error('获取 key 失败');

    const qrRes = await fetch(API + '/api/login/qr/create?key=' + keyData.key);
    const qrData = await qrRes.json();
    if (!qrData.img) throw new Error('生成二维码失败');

    qrDiv.innerHTML = '<img src="' + qrData.img + '" alt="扫码">';
    btn.disabled = false;
    statusDiv.textContent = '请打开网易云音乐 App 扫码';

    wyTimer = setInterval(async () => {
      try {
        const r = await fetch(API + '/api/login/qr/check?key=' + keyData.key);
        const d = await r.json();
        if (d.code === 803) {
          clearInterval(wyTimer);
          qrDiv.innerHTML = '✅';
          statusDiv.textContent = '登录成功！' + (d.nickname || '');
          statusDiv.className = 'status-line success';
          btn.disabled = false;
          setTimeout(() => { checkWy(); updateOverall(); }, 500);
        } else if (d.code === 802) {
          statusDiv.textContent = '已扫描，请在手机上确认...';
        } else if (d.code === 800) {
          clearInterval(wyTimer);
          statusDiv.textContent = '二维码已过期，请刷新';
          statusDiv.className = 'status-line error';
          btn.disabled = false;
        }
      } catch(e) {}
    }, 2000);
  } catch(err) {
    qrDiv.innerHTML = '❌';
    statusDiv.textContent = '错误: ' + err.message;
    statusDiv.className = 'status-line error';
    btn.disabled = false;
  }
}

async function wyLogout() {
  try { await fetch(API + '/api/logout'); } catch(e) {}
  checkWy(); updateOverall();
}

// ========== QQ ==========
async function checkQQ() {
  try {
    const r = await fetch(API + '/api/qq/login/status');
    const d = await r.json();
    const badge = document.getElementById('qq-badge');
    const loggedIn = document.getElementById('qq-logged-in');
    const loginForm = document.getElementById('qq-login-form');
    const infoDiv = document.getElementById('qq-info');

    if (d.loggedIn) {
      badge.textContent = '✅ 已登录'; badge.className = 'badge badge-ok';
      loggedIn.style.display = 'block'; loginForm.style.display = 'none';
      infoDiv.innerHTML =
        '<div class="info-item"><span class="info-label">昵称</span><span class="info-value">' + (d.nickname || '-') + '</span></div>' +
        '<div class="info-item"><span class="info-label">播放授权</span><span class="info-value">' + (d.playbackKeyReady ? '✅ 就绪' : '⚠️ 未就绪（需打开QQ音乐网页重新登录）') + '</span></div>';
      document.getElementById('info-qq').textContent = '✅ ' + (d.nickname || '已登录') + (d.playbackKeyReady ? '' : ' · 播放授权未就绪');
    } else {
      badge.textContent = d.hasCookie ? '⚠️ 已过期' : '❌ 未登录';
      badge.className = d.hasCookie ? 'badge badge-warn' : 'badge badge-err';
      loggedIn.style.display = 'none'; loginForm.style.display = 'block';
      document.getElementById('info-qq').textContent = d.hasCookie ? '⚠️ Cookie已过期' : '❌ 未登录';
      document.getElementById('qq-status').textContent = d.hasCookie ? 'Cookie 已过期，请重新获取' : '未登录，请粘贴 Cookie';
      document.getElementById('qq-status').className = d.hasCookie ? 'status-line error' : 'status-line';
    }
  } catch(e) {
    document.getElementById('qq-badge').textContent = '⚠️ 连接失败'; document.getElementById('qq-badge').className = 'badge badge-err';
    document.getElementById('info-qq').textContent = '⚠️ 连接失败';
  }
}

function qqShowForm() {
  document.getElementById('qq-logged-in').style.display = 'none';
  document.getElementById('qq-login-form').style.display = 'block';
  qqCheck();
}

async function qqSave() {
  const s = document.getElementById('qq-status');
  const btn = document.getElementById('qq-save');
  const raw = document.getElementById('qq-cookie-input').value.trim();
  if (!raw) { s.textContent = '请先粘贴 Cookie'; s.className = 'status-line error'; return; }

  btn.disabled = true; s.textContent = '保存中...'; s.className = 'status-line';
  try {
    const r = await fetch(API + '/api/qq/login/cookie', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cookie: raw })
    });
    const d = await r.json();
    if (d.loggedIn) {
      document.getElementById('qq-cookie-input').value = '';
      checkQQ(); updateOverall();
    } else {
      s.textContent = '❌ ' + (d.message || 'Cookie 无效');
      s.className = 'status-line error';
    }
  } catch(e) { s.textContent = '保存失败: ' + e.message; s.className = 'status-line error'; }
  btn.disabled = false;
}

async function qqLogout() {
  try { await fetch(API + '/api/qq/logout'); } catch(e) {}
  checkQQ(); updateOverall();
}

async function refreshAll() {
  document.getElementById('overall-badge').textContent = '检测中...';
  document.getElementById('overall-badge').className = 'badge badge-warn';
  await Promise.all([checkWy(), checkQQ()]);
  updateOverall();
}

init();
</script>

<!-- 底部操作栏 -->
<div style="text-align:center; margin-top: 16px; display: flex; gap: 10px; justify-content: center;">
  <button class="btn-outline" onclick="refreshAll()" style="font-size:14px; padding:10px 24px;">🔄 刷新登录状态</button>
  <button class="btn-outline" onclick="window.close()" style="font-size:14px; padding:10px 24px;">✕ 关闭页面</button>
</div>
<div class="footer" style="margin-top:12px">登录态自动检测 · 已就绪时下次启动将跳过此页面</div>

</body>
</html>
